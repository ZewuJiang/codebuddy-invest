<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦆 投研鸭 · {{DATE}} 每日投资策略简报</title>
<style>
/* ========== 基础重置 ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif;
  color:#333;background:#f5f6fa;line-height:1.6;-webkit-font-smoothing:antialiased;
  max-width:480px;margin:0 auto;padding-bottom:70px;min-height:100vh;
}

/* ========== 顶部标题 ========== */
.top-header{
  background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:16px 20px;
  text-align:center;position:sticky;top:0;z-index:100;
}
.top-title{font-size:18px;font-weight:700;color:#FFB800;letter-spacing:1px}
.top-date{font-size:12px;color:rgba(255,255,255,.5);margin-top:4px}

/* ========== 底部 TabBar ========== */
.tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:#fff;display:flex;
  border-top:1px solid #f0f0f0;z-index:100;padding:6px 0 env(safe-area-inset-bottom);
}
.tab-item{
  flex:1;text-align:center;padding:8px 0;cursor:pointer;
  transition:color .2s;color:#999;font-size:11px;
}
.tab-item.active{color:#FFB800;font-weight:600}
.tab-icon{font-size:20px;display:block;margin-bottom:2px}

/* ========== Tab 内容区 ========== */
.tab-content{display:none;padding:12px}
.tab-content.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ========== 通用卡片 ========== */
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.card-title{font-size:13px;font-weight:600;color:#e67e22;letter-spacing:.5px;margin-bottom:10px}

/* ========== 通用标签 ========== */
.tag{display:inline-block;font-size:11px;padding:2px 10px;border-radius:12px;font-weight:500;margin-right:4px}
.tag-red{background:rgba(231,76,60,.1);color:#e74c3c}
.tag-orange{background:rgba(243,156,18,.12);color:#e67e22}
.tag-yellow{background:rgba(255,184,0,.15);color:#e6a600}
.tag-green{background:rgba(39,174,96,.1);color:#27ae60}
.tag-blue{background:rgba(52,152,219,.1);color:#2980b9}
.tag-gray{background:rgba(153,153,153,.1);color:#999}
.color-up{color:#e74c3c}.color-down{color:#27ae60}.color-flat{color:#999}

/* ========== section-card 折叠组件 ========== */
.section-card{background:#fff;border-radius:12px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,.06);overflow:hidden}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer}
.section-title{font-size:15px;font-weight:700;color:#1a1a2e}
.section-arrow{font-size:14px;color:#ccc;transition:transform .3s}
.section-arrow.open{transform:rotate(180deg)}
.section-body{padding:0 16px 16px;overflow:hidden;transition:max-height .4s ease,opacity .3s ease}
.section-body.collapsed{max-height:0;opacity:0;padding-top:0;padding-bottom:0}

/* ========== 简报页：时间状态栏 ========== */
.ts-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(26,26,46,.88);padding:10px 20px;margin-bottom:12px;border-radius:0 0 12px 12px;
}
.ts-item{flex:1;text-align:center}
.ts-divider{width:1px;height:28px;background:rgba(255,255,255,.15);flex-shrink:0}
.ts-time{font-size:18px;font-weight:700;color:#FFB800;letter-spacing:.5px}
.ts-label{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.ts-market-tag{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500;margin-left:4px}
.ts-market-open{background:rgba(39,174,96,.25);color:#27ae60}
.ts-market-closed{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4)}

/* ========== 简报页：takeaway ========== */
.takeaway-text{font-size:14px;font-weight:500;color:#333;line-height:1.8}
.takeaway-hl{color:#e74c3c;font-weight:700}

/* ========== 简报页：事件链 ========== */
.chain-item{display:flex;align-items:flex-start;margin-bottom:12px;position:relative}
.chain-item:last-child{margin-bottom:0}
.chain-dot{width:8px;height:8px;border-radius:50%;background:#FFB800;flex-shrink:0;margin-top:7px;margin-right:10px}
.chain-body{flex:1;min-width:0}
.chain-title{display:block;font-size:14px;font-weight:700;color:#1a1a2e;line-height:1.5;margin-bottom:2px}
.chain-brief{display:block;font-size:12px;color:#888;line-height:1.6}
.chain-source{font-size:11px;color:#2980b9;margin-top:2px;display:inline-block}
.chain-source a{color:#2980b9;text-decoration:none}
.chain-source a:hover{text-decoration:underline}

/* ========== 简报页：全球资产反应 ========== */
.reaction-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
.reaction-item{text-align:center;padding:8px 4px;border-bottom:1px solid #f5f5f5}
.reaction-item:nth-last-child(-n+3){border-bottom:none}
.reaction-name{font-size:12px;color:#999;margin-bottom:4px}
.reaction-value{font-size:15px;font-weight:700}
.reaction-note{font-size:10px;color:#bbb;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ========== 简报页：核心判断 ========== */
.judgment-item{margin-bottom:16px;padding:14px;background:#f8f9fc;border-radius:10px}
.judgment-item:last-child{margin-bottom:0}
.judgment-header{display:flex;align-items:flex-start;margin-bottom:8px}
.judgment-num{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#FFB800,#FF8C00);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:8px;margin-top:1px}
.judgment-title{font-size:13px;font-weight:600;color:#1a1a2e;line-height:1.5;flex:1}
.confidence-row{display:flex;align-items:center;margin-bottom:8px}
.confidence-label{font-size:12px;color:#999;margin-right:8px;flex-shrink:0}
.confidence-bar{flex:1;height:8px;background:#eee;border-radius:4px;overflow:hidden;margin-right:8px}
.confidence-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#FFB800,#FF8C00);transition:width .8s ease}
.confidence-value{font-size:13px;font-weight:700;color:#FFB800;flex-shrink:0;min-width:36px;text-align:right}
.logic-text{font-size:12px;color:#888;line-height:1.6}
.jx-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.jx-ref{margin-top:8px;font-size:11px;color:#888}
.jx-ref a{color:#2980b9;text-decoration:none}

/* ========== 简报页：聪明钱建议 ========== */
.action-hint-item{display:flex;align-items:flex-start;margin-bottom:10px;padding:10px;background:#f8f9fc;border-radius:8px}
.action-hint-item:last-child{margin-bottom:0}
.action-body{flex:1;min-width:0}
.action-content{font-size:13px;color:#333;line-height:1.6}
.action-reason{font-size:12px;color:#999;line-height:1.5;margin-top:4px}
.sm-section-title{font-size:13px;font-weight:600;color:#666;border-top:1px solid #f0f0f0;padding-top:12px;margin:12px 0 8px}
.smart-money-item{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5}
.smart-money-item:last-child{border-bottom:none;padding-bottom:0}
.sm-left{display:flex;align-items:center;flex-shrink:0;margin-right:10px}
.sm-signal{width:8px;height:8px;border-radius:50%;margin-right:6px}
.sm-bullish{background:#e74c3c;box-shadow:0 0 3px rgba(231,76,60,.4)}
.sm-bearish{background:#27ae60;box-shadow:0 0 3px rgba(39,174,96,.4)}
.sm-neutral{background:#f1c40f;box-shadow:0 0 3px rgba(241,196,15,.4)}
.sm-source{font-size:14px;font-weight:600;color:#1a1a2e;white-space:nowrap}
.sm-action{font-size:12px;color:#666;line-height:1.5;text-align:right;flex:1}
.holdings-title{font-size:13px;font-weight:600;color:#666;border-top:1px solid #f0f0f0;padding-top:12px;margin:12px 0 8px}
.holdings-item{display:flex;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f5f5f5}
.holdings-item:last-child{border-bottom:none;padding-bottom:0}
.holdings-name{font-size:13px;font-weight:600;color:#1a1a2e;flex-shrink:0;margin-right:10px;min-width:60px}
.holdings-detail{font-size:12px;color:#888;line-height:1.6;flex:1}

/* ========== 简报页：风险情绪 ========== */
.risk-sent-card{border-left:4px solid #e74c3c}
.sentiment-bar{display:flex;align-items:center;margin-top:6px}
.sentiment-label-text{font-size:12px;color:#999;flex-shrink:0}
.sentiment-track{flex:1;height:8px;background:#eee;border-radius:4px;margin:0 10px;overflow:visible;position:relative}
.sentiment-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#27ae60,#f1c40f 50%,#e74c3c);transition:width .8s ease}
.sentiment-pointer{position:absolute;top:-6px;transform:translateX(-50%);transition:left .8s ease}
.sentiment-pointer-dot{width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid #FFB800;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.sentiment-info{text-align:center;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.sentiment-number{font-size:28px;font-weight:700;color:#FFB800}
.sentiment-tag{font-size:12px;color:#999;background:rgba(255,184,0,.1);padding:2px 10px;border-radius:10px}
.risk-list{margin-top:14px;border-top:1px solid #fce4e4;padding-top:10px}
.risk-item{display:flex;align-items:flex-start;margin-bottom:10px}
.risk-item:last-child{margin-bottom:0}
.risk-dot{color:#e74c3c;font-size:14px;font-weight:bold;margin-right:8px;flex-shrink:0;line-height:1.7}
.risk-item-text{font-size:12px;color:#666;line-height:1.7;flex:1}

/* ========== 市场页：Tab栏 ========== */
.market-tabs{display:flex;background:#fff;padding:10px 16px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;z-index:10;border-radius:12px 12px 0 0}
.market-tab{flex:1;text-align:center;font-size:13px;color:#999;padding:8px 0;cursor:pointer;transition:color .3s;position:relative}
.market-tab.active{color:#FFB800;font-weight:600}
.market-tab.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:6px;height:6px;background:linear-gradient(135deg,#FFB800,#FF8C00);border-radius:50%}
.market-panel{display:none;padding:12px 0}
.market-panel.active{display:block;animation:fadeIn .3s ease}

/* ========== 市场页：摘要条 ========== */
.market-summary{padding:10px 14px;background:linear-gradient(135deg,rgba(255,184,0,.08),rgba(255,140,0,.04));border-radius:8px;border-left:3px solid #FFB800;margin-bottom:12px;font-size:13px;color:#555;line-height:1.7}

/* ========== 市场页：列表 ========== */
.market-list{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.market-list-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #f5f5f5}
.market-list-item:last-child{border-bottom:none}
.ml-left{flex:1;min-width:0}
.ml-name{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:2px}
.ml-price{font-size:12px;color:#888}
.ml-center{flex-shrink:0;margin:0 8px;width:80px;height:30px}
.ml-right{text-align:right;min-width:70px;flex-shrink:0}
.ml-change{font-size:14px;font-weight:700}
.ml-label{font-size:10px;color:#999;margin-top:2px}

/* ========== 市场页：SVG sparkline ========== */
.sparkline-svg{display:block}

/* ========== 市场页：GICS 热力图 ========== */
.gics-section{margin-top:12px}
.gics-title{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:12px;padding-left:8px;border-left:3px solid #FFB800}
.gics-item{display:flex;align-items:center;padding:6px 0}
.gics-name{font-size:12px;color:#555;width:100px;flex-shrink:0}
.gics-bar{flex:1;height:10px;background:#f5f5f5;border-radius:5px;overflow:hidden;margin:0 10px}
.gics-bar-fill{height:100%;border-radius:5px;transition:width .8s ease;max-width:100%}
.bar-up{background:linear-gradient(90deg,rgba(231,76,60,.3),#e74c3c)}
.bar-down{background:linear-gradient(90deg,rgba(39,174,96,.3),#27ae60)}
.gics-change{font-size:12px;font-weight:600;min-width:55px;text-align:right;flex-shrink:0}

/* ========== 标的页：板块 Tab ========== */
.sector-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.sector-tab{padding:6px 16px;font-size:13px;color:#666;border-radius:16px;background:#f5f5f5;cursor:pointer;transition:all .3s}
.sector-tab.active{background:linear-gradient(135deg,#FFB800,#FF8C00);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(255,184,0,.3)}
.sector-overview{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 8px rgba(0,0,0,.06);border-top:3px solid #FFB800;display:none}
.sector-overview.active{display:block}
.sector-title-text{font-size:17px;font-weight:700;color:#1a1a2e;display:flex;justify-content:space-between;align-items:center}
.sector-desc{font-size:13px;color:#666;line-height:1.7;margin-top:8px}
.sector-count{font-size:11px;color:#bbb;margin-top:8px}

/* ========== 标的页：stock-card ========== */
.stock-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 8px rgba(0,0,0,.06);cursor:pointer;transition:transform .15s,box-shadow .15s}
.stock-card:active{transform:scale(.985)}
.stock-card.unlisted{border:1px dashed #ddd;background:#fafbfc}
.sc-header{display:flex;justify-content:space-between;align-items:flex-start}
.sc-name-area{flex:1;min-width:0}
.sc-name{font-size:16px;font-weight:700;color:#1a1a2e}
.sc-symbol-price{display:flex;align-items:center;gap:8px;margin-top:2px}
.sc-symbol{font-size:11px;color:#999}
.sc-price{font-size:13px;font-weight:600;color:#555}
.sc-unlisted-label{font-size:10px;color:#999;background:#f0f0f0;padding:1px 8px;border-radius:4px}
.sc-chart-area{flex-shrink:0;margin:0 8px;display:flex;align-items:center}
.sc-right{text-align:right;flex-shrink:0;min-width:60px}
.sc-change{font-size:17px;font-weight:800}
.sc-expand-hint{font-size:14px;color:#ccc;margin-top:2px}
.sc-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.badge{font-size:10px;font-weight:600;padding:1px 8px;border-radius:4px;line-height:1.6}
.badge-buffett{color:#b8860b;background:rgba(255,193,7,.12);border:1px solid rgba(255,193,7,.3)}
.badge-duan{color:#2563eb;background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.2)}
.badge-unlisted{color:#888;background:rgba(153,153,153,.1);border:1px solid rgba(153,153,153,.2)}
.badge-default{color:#b8860b;background:rgba(255,193,7,.12);border:1px solid rgba(255,193,7,.3)}
.sc-tags{margin:8px 0 4px;display:flex;flex-wrap:wrap;gap:4px}
.sc-reason{font-size:12px;color:#888;line-height:1.6;margin-top:6px;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden}
.sc-detail{overflow:hidden;max-height:0;opacity:0;transition:max-height .4s ease,opacity .3s ease}
.sc-detail.open{max-height:2000px;opacity:1;margin-top:14px}
.sc-chart-large{margin-bottom:14px;padding:12px;background:#f8f9fc;border-radius:8px}
.sc-chart-large-title{font-size:12px;color:#999;margin-bottom:8px}
.sc-metrics-title{font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:8px}
.sc-metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);background:#f8f9fc;border-radius:8px;padding:6px 0}
.sc-metric-item{text-align:center;padding:6px 0}
.sc-metric-label{font-size:10px;color:#999}
.sc-metric-value{font-size:13px;font-weight:600;color:#333;margin-top:2px}
.sc-analysis{margin:12px 0;font-size:12px;color:#666;line-height:1.7;padding:10px 12px;background:#f8f9fc;border-radius:8px;border-left:3px solid #FFB800;white-space:pre-wrap}
.sc-risks{padding:10px 12px;background:rgba(231,76,60,.04);border-radius:8px;border-left:3px solid #e74c3c}
.sc-risks-title{font-size:12px;font-weight:600;color:#e74c3c;margin-bottom:6px}
.sc-risk-item{display:flex;align-items:flex-start;margin-bottom:4px}
.sc-risk-item:last-child{margin-bottom:0}
.sc-risk-dot{width:5px;height:5px;border-radius:50%;background:#e74c3c;margin-top:7px;margin-right:6px;flex-shrink:0}
.sc-risk-text{font-size:11px;color:#999;line-height:1.6}

/* ========== 雷达页：聪明钱动向 ========== */
.sm-flat-item{padding:10px 0;border-bottom:1px solid #f8f8f8}
.sm-flat-item:last-child{border-bottom:none}
.sm-flat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sm-flat-left{display:flex;align-items:center}
.sm-flat-name{font-size:14px;font-weight:700;color:#1a1a2e;margin-right:4px}
.sm-tier-badge{font-size:10px;background:rgba(255,184,0,.15);color:#FFB800;padding:1px 6px;border-radius:4px;font-weight:600}
.sm-flat-action{font-size:12px;color:#555;line-height:1.7}
.source-link{font-size:10px;color:#2980b9;display:inline-flex;align-items:center;gap:2px}
.source-link a{color:#2980b9;text-decoration:none}

/* ========== 雷达页：聪明钱持仓 ========== */
.holdings-group{margin-bottom:12px}
.holdings-group:last-child{margin-bottom:0}
.holdings-group-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;cursor:pointer}
.holdings-manager{font-size:14px;font-weight:700;color:#1a1a2e}
.holdings-aum{font-size:11px;color:#999;margin-left:8px}
.holdings-date{font-size:10px;color:#bbb;background:#f8f8f8;padding:2px 8px;border-radius:4px}
.holdings-arrow{font-size:10px;color:#ccc;margin-left:6px}
.holdings-body{padding:8px 0;overflow:hidden;transition:max-height .3s ease;max-height:0;opacity:0}
.holdings-body.open{max-height:1000px;opacity:1}
.holdings-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #fafafa}
.holdings-row:last-child{border-bottom:none}
.holdings-rank{font-size:11px;font-weight:700;color:#ccc;width:20px;text-align:center;flex-shrink:0}
.holdings-stock-info{display:flex;align-items:baseline;gap:4px;flex:1;margin-left:6px}
.holdings-stock-name{font-size:13px;font-weight:600;color:#333}
.holdings-stock-symbol{font-size:10px;color:#999}
.holdings-weight{font-size:13px;font-weight:700;color:#FFB800;min-width:50px;text-align:right}
.holdings-change-tag{font-size:10px;color:#999;background:#f5f5f5;padding:1px 6px;border-radius:4px;margin-left:6px}
.holdings-footnote{padding:8px 0 4px;border-top:1px dashed #f0f0f0;margin-top:4px;font-size:10px;color:#bbb;line-height:1.6}

/* ========== 雷达页：风险判断 ========== */
.risk-verdict{background:linear-gradient(135deg,rgba(231,76,60,.06),rgba(255,184,0,.04));border-left:3px solid #e74c3c;border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:12px}
.risk-verdict-text{font-size:13px;font-weight:600;color:#333;line-height:1.8}
.traffic-lights{display:flex;flex-direction:column;gap:4px}
.tl-item{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #fafafa}
.tl-item:last-child{border-bottom:none}
.tl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-right:10px}
.tl-green{background:#27ae60;box-shadow:0 0 4px rgba(39,174,96,.4)}
.tl-yellow{background:#f1c40f;box-shadow:0 0 4px rgba(241,196,15,.4)}
.tl-red{background:#e74c3c;box-shadow:0 0 4px rgba(231,76,60,.4)}
.tl-name{font-size:13px;color:#333;flex:1;font-weight:500}
.tl-value{font-size:13px;font-weight:600;min-width:60px;text-align:right}
.tl-threshold{font-size:10px;color:#bbb;min-width:100px;text-align:right;margin-left:8px}

/* ========== 雷达页：本周前瞻 ========== */
.wa-item{display:flex;align-items:flex-start;margin-bottom:4px}
.wa-item:last-child{margin-bottom:0}
.wa-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;margin-right:14px;width:44px}
.wa-date-badge{width:44px;padding:4px 0;border-radius:6px;text-align:center}
.wa-badge-event{background:rgba(255,184,0,.15)}
.wa-badge-risk{background:rgba(231,76,60,.1)}
.wa-date-text{font-size:11px;font-weight:700}
.wa-badge-event .wa-date-text{color:#FFB800}
.wa-badge-risk .wa-date-text{color:#e74c3c}
.wa-line{width:1px;flex:1;min-height:16px;background:linear-gradient(180deg,#e8e8e8,transparent);margin-top:4px}
.wa-right{flex:1;padding-bottom:16px}
.wa-item:last-child .wa-right{padding-bottom:4px}
.wa-title-text{font-size:13px;font-weight:600;color:#1a1a2e;line-height:1.5}
.wa-impact{margin-top:4px}

/* ========== 雷达页：预测市场 ========== */
.pm-item{padding:12px 0;border-bottom:1px solid #f5f5f5}
.pm-item:last-child{border-bottom:none;padding-bottom:0}
.pm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pm-title{font-size:13px;font-weight:600;color:#1a1a2e;flex:1;margin-right:8px}
.pm-source{font-size:10px;color:#bbb;background:#f5f5f5;padding:2px 8px;border-radius:4px}
.pm-bar-row{display:flex;align-items:center;gap:8px}
.pm-bar-track{flex:1;height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden}
.pm-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#2980b9,#FFB800);transition:width .8s ease}
.pm-probability{font-size:18px;font-weight:800;color:#FFB800;min-width:45px;text-align:right}
.pm-change{font-size:11px;font-weight:500;margin-top:4px}

/* ========== 雷达页：异动信号 ========== */
.alert-item{padding:12px;border-radius:8px;margin-bottom:8px}
.alert-item:last-child{margin-bottom:0}
.alert-danger{background:rgba(231,76,60,.06)}
.alert-warning{background:rgba(241,196,15,.08)}
.alert-info{background:rgba(39,174,96,.06)}
.alert-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.alert-icon{flex-shrink:0}
.alert-time{font-size:11px;color:#bbb}
.alert-text{font-size:13px;color:#333;line-height:1.6}

/* ========== 底部 footer ========== */
.data-footer{text-align:center;padding:16px 20px 8px;font-size:11px;color:#bbb}
.gen-footer{text-align:center;padding:8px 20px;font-size:10px;color:#ccc}

/* ========== 空状态 ========== */
.empty-state{text-align:center;padding:40px 20px;color:#999;font-size:14px}
.empty-icon{font-size:40px;margin-bottom:10px}
</style>
</head>
<body>

<!-- 顶部标题 -->
<div class="top-header">
  <div class="top-title">🦆 投研鸭 · 每日投资策略简报</div>
  <div class="top-date">{{DATE}} · 由 investment-agent-html Skill 生成</div>
</div>

<!-- ==================== Tab 内容区 ==================== -->

<!-- Tab 1：简报页 -->
<div class="tab-content active" id="tab-briefing">
  {{BRIEFING_CONTENT}}
</div>

<!-- Tab 2：市场页 -->
<div class="tab-content" id="tab-markets">
  {{MARKETS_CONTENT}}
</div>

<!-- Tab 3：标的页 -->
<div class="tab-content" id="tab-watchlist">
  {{WATCHLIST_CONTENT}}
</div>

<!-- Tab 4：雷达页 -->
<div class="tab-content" id="tab-radar">
  {{RADAR_CONTENT}}
</div>

<!-- 底部 TabBar -->
<div class="tab-bar">
  <div class="tab-item active" onclick="switchTab('briefing')">
    <span class="tab-icon">📌</span>简报
  </div>
  <div class="tab-item" onclick="switchTab('markets')">
    <span class="tab-icon">📊</span>市场
  </div>
  <div class="tab-item" onclick="switchTab('watchlist')">
    <span class="tab-icon">⭐</span>标的
  </div>
  <div class="tab-item" onclick="switchTab('radar')">
    <span class="tab-icon">🛡️</span>雷达
  </div>
</div>

<!-- ==================== JavaScript ==================== -->
<script>
// Tab 切换
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.tab-item').forEach(el => {
    if (el.textContent.trim().includes({briefing:'简报',markets:'市场',watchlist:'标的',radar:'雷达'}[name])) el.classList.add('active');
  });
  window.scrollTo(0, 0);
}

// 市场页子 Tab 切换
function switchMarketTab(name) {
  document.querySelectorAll('.market-panel').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.market-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('mp-' + name).classList.add('active');
  document.querySelectorAll('.market-tab').forEach(el => {
    if (el.getAttribute('data-tab') === name) el.classList.add('active');
  });
}

// 标的页板块切换
function switchSector(id) {
  document.querySelectorAll('.sector-tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.sector-overview').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.stock-card-group').forEach(el => el.style.display = 'none');
  document.querySelector('.sector-tab[data-id="' + id + '"]').classList.add('active');
  var overview = document.getElementById('so-' + id);
  if (overview) overview.classList.add('active');
  var group = document.getElementById('sg-' + id);
  if (group) group.style.display = 'block';
}

// stock-card 展开/收起
function toggleStock(el) {
  var detail = el.querySelector('.sc-detail');
  var hint = el.querySelector('.sc-expand-hint');
  if (detail.classList.contains('open')) {
    detail.classList.remove('open');
    if (hint) hint.textContent = '﹀';
  } else {
    detail.classList.add('open');
    if (hint) hint.textContent = '︿';
  }
}

// section-card 折叠/展开
function toggleSection(btn) {
  var card = btn.closest('.section-card');
  var body = card.querySelector('.section-body');
  var arrow = btn.querySelector('.section-arrow');
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    body.style.maxHeight = body.scrollHeight + 200 + 'px';
    body.style.opacity = '1';
    body.style.padding = '0 16px 16px';
    if (arrow) arrow.classList.add('open');
  } else {
    body.classList.add('collapsed');
    body.style.maxHeight = '0';
    body.style.opacity = '0';
    body.style.padding = '0 16px 0';
    if (arrow) arrow.classList.remove('open');
  }
}

// 雷达页持仓折叠
function toggleHoldings(el) {
  var body = el.nextElementSibling;
  var arrow = el.querySelector('.holdings-arrow');
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    body.style.maxHeight = '0';
    body.style.opacity = '0';
    if (arrow) arrow.textContent = '▼';
  } else {
    body.classList.add('open');
    body.style.maxHeight = body.scrollHeight + 100 + 'px';
    body.style.opacity = '1';
    if (arrow) arrow.textContent = '▲';
  }
}
</script>

</body>
</html>
